version: "3.9"

services:
  app:
    build: .
    ports:
      - "8501:8501"
    environment:
      - OLLAMA_BASE_URL=http://ollama:11434
      - NCBI_API_KEY=${NCBI_API_KEY:-}
    volumes:
      - ./data/evidence:/app/data/evidence
      - ./data/faiss_index:/app/data/faiss_index
    depends_on:
      - ollama

  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_models:/root/.ollama

volumes:
  ollama_models: